name: Build Uploader Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "uploader-v*"
    paths:
      - "Uploader/**"
      - ".github/workflows/build-uploader-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: Uploader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile uploader.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: tamasha-uploader-windows
          path: Uploader/dist/uploader.exe